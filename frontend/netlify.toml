# ── Netlify build configuration ─────────────────────────────────────
# Frontend lives in the `frontend/` folder of the monorepo (Vite + React).
# For a GitHub-connected deploy, set the site's Base directory = "frontend"
# in the Netlify UI. `command` and `publish` here are relative to that base,
# so they need no "frontend/" prefix.
# (Current production uses Netlify Drop: build locally, drag `frontend/dist`.)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  VITE_API_BASE_URL = "https://vvvstock-production.up.railway.app/api/v1"

# SPA fallback — serve index.html for any unmatched path so deep links
# and refreshes don't 404. (App uses state-based navigation, no routing,
# but this keeps direct refresh / unknown paths working.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
